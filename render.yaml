services:
  - type: web
    name: komorebi
    env: node
    buildCommand: pnpm install && node node_modules/@anthropic-ai/claude-code/install.cjs && pnpm build:web
    startCommand: node dist-server/main.cjs
    envVars:
      - key: KOMOREBI_WEB
        value: "1"
      - key: NODE_VERSION
        value: "22"
      - key: TURSO_DB_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: CLAUDE_CODE_OAUTH_TOKEN
        sync: false
