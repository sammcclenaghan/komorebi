<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Rising sun on a TRANSPARENT background. The sun is a warm GOLD disc (not
       flat white) wrapped in a broad pale corona that bleeds into the sky, so
       the whole tile reads as dawn light rather than a ball pasted on orange.
       Sits slightly low (cresting) for a sunrise feel. Keep Icon Composer's
       glass/translucency OFF on this layer — the warmth is baked in here. -->
  <defs>
    <!-- Broad corona glowing out from the sun into the sky above and around. -->
    <radialGradient id="corona" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff7d2" stop-opacity="0.95"/>
      <stop offset="34%"  stop-color="#ffe9a0" stop-opacity="0.5"/>
      <stop offset="64%"  stop-color="#ffd66e" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffc94e" stop-opacity="0"/>
    </radialGradient>

    <!-- Sun body: bright warm core -> gold -> amber rim, lit from upper-left. -->
    <radialGradient id="body" cx="42%" cy="35%" r="74%">
      <stop offset="0%"   stop-color="#fffef9"/>
      <stop offset="42%"  stop-color="#fff4d0"/>
      <stop offset="78%"  stop-color="#ffe49c"/>
      <stop offset="100%" stop-color="#fccb63"/>
    </radialGradient>

    <!-- Warm reflected bounce into the lower edge of the disc. -->
    <radialGradient id="bounce" cx="58%" cy="84%" r="46%">
      <stop offset="0%"   stop-color="#fff3c8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff3c8" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft specular hotspot, upper-left. -->
    <radialGradient id="spec" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- corona: large, centered on the sun, fades into the sky -->
  <circle cx="512" cy="470" r="540" fill="url(#corona)"/>

  <!-- sun disc -->
  <circle cx="512" cy="470" r="350" fill="url(#body)"/>
  <circle cx="512" cy="470" r="350" fill="url(#bounce)"/>

  <!-- specular glint, upper-left of the sun -->
  <ellipse cx="404" cy="362" rx="118" ry="86" fill="url(#spec)"/>
</svg>
