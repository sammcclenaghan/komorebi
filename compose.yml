services:
  komorebi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: komorebi
    restart: unless-stopped
    ports:
      - "3847:3847"
    environment:
      KOMOREBI_WEB: "1"
      KOMOREBI_HOST: "0.0.0.0"
      KOMOREBI_PORT: "3847"
      KOMOREBI_DATA_DIR: "/data"
      OLLAMA_HOST: "http://192.168.0.223:11434"
      OLLAMA_MODEL: "gpt-oss:120b-cloud"
      OLLAMA_WEB_SEARCH_API_KEY: "${OLLAMA_WEB_SEARCH_API_KEY:-}"
      EXA_API_KEY: "${EXA_API_KEY:-}"
      COMPOSIO_API_KEY: "${COMPOSIO_API_KEY:-}"
      KOMOREBI_API_TOKEN: "${KOMOREBI_API_TOKEN:-}"
    volumes:
      - komorebi-data:/data

volumes:
  komorebi-data:
